<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look for a SR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3>Look for a Submit Request</h3>
                    </div>
                    <div class="card-body">
                        <form action="/result" method="post">
                            <div class="mb-3">
                                <label for="request_id" class="form-label">Request ID:</label>
                                <input type="text"
                                       class="form-control"
                                       id="request_id"
                                       name="request_id"
                                       placeholder="e.g., 1322956"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="apiurl" class="form-label">API URL:</label>
                                <select name="apiurl" class="form-select">
                                    <option value="https://api.opensuse.org"
                                            {% if current_apiurl == "https://api.opensuse.org" %}selected{% endif %}>
                                        openSUSE
                                    </option>
                                    <option value="https://api.suse.de"
                                            {% if current_apiurl == "https://api.suse.de" %}selected{% endif %}>
                                        SUSE
                                    </option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="theme" class="form-label">Theme:</label>
                                <select name="theme" class="form-select">
                                    <option value="light"
                                            {% if current_theme == "light" %}selected{% endif %}>
                                        Light
                                    </option>
                                    <option value="dark"
                                            {% if current_theme == "dark" %}selected{% endif %}>
                                        Dark
                                    </option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Load SR</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
